name: Frontend E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run frontend Cypress tests
        run: npx cypress run --spec "cypress/e2e/frontend.cy.js" --config "baseUrl=,specPattern=cypress/e2e/frontend.cy.js"
