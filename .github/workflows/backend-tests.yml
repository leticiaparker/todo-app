name: Backend API Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root dependencies
        run: npm install
      - name: Install backend dependencies
        run: cd backend && npm install
      - name: Start backend
        run: cd backend && node server.js &
      - name: Wait for backend
        run: npx wait-on http://localhost:3001/api/tasks --timeout 15000
      - name: Run backend Cypress tests
        run: npx cypress run --spec "cypress/e2e/backend.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:3001/e2e/backend.cy.js" --config "baseUrl="
