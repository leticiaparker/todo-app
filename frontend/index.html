<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161920; --surface2: #1e2130;
      --border: #2a2f45; --accent: #6ee7b7; --accent2: #818cf8;
      --text: #e8eaf0; --muted: #6b7280; --danger: #f87171; --radius: 14px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 52px 20px 100px;
      background-image:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(110,231,183,.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 10% 90%, rgba(129,140,248,.07) 0%, transparent 60%);
    }
    header { width: 100%; max-width: 580px; margin-bottom: 40px; text-align: center; }
    .logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.6rem;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { color: var(--muted); font-size: 0.92rem; margin-top: 6px; font-weight: 300; font-style: italic; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 580px; overflow: hidden; }
    .input-row { display: flex; border-bottom: 1px solid var(--border); }
    #task-input {
      flex: 1; background: transparent; border: none; outline: none;
      padding: 18px 20px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    }
    #task-input::placeholder { color: var(--muted); }
    #add-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; padding: 0 26px; cursor: pointer;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem;
      color: #0d0f14; letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0;
    }
    #add-btn:hover { opacity: .85; }
    .filters { display: flex; gap: 4px; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .filter-btn {
      background: none; border: 1px solid transparent; border-radius: 8px;
      padding: 5px 15px; color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; cursor: pointer; transition: all .18s;
    }
    .filter-btn:hover { border-color: var(--border); color: var(--text); background: var(--surface); }
    .filter-btn.active { color: var(--accent); border-color: var(--accent); background: var(--surface); }
    #task-list { list-style: none; }
    .task-item {
      display: flex; align-items: flex-start; gap: 13px; padding: 15px 18px;
      border-bottom: 1px solid var(--border); transition: background .15s;
      animation: slideIn .22s ease;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: var(--surface2); }
    .task-item.is-done { opacity: .72; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-7px); } to { opacity:1; transform:translateY(0); } }
    .task-check {
      width: 21px; height: 21px; border-radius: 50%; border: 2px solid var(--border);
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: all .2s; margin-top: 2px;
    }
    .task-check:hover { border-color: var(--accent); }
    .task-check.done { background: var(--accent); border-color: var(--accent); }
    .task-check.done::after {
      content: ''; width: 5px; height: 9px; border: 2px solid #0d0f14;
      border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px);
    }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 0.94rem; line-height: 1.45; word-break: break-word; display: block; }
    .task-title.done { text-decoration: line-through; text-decoration-color: var(--muted); color: var(--muted); }
    .task-meta { font-size: 0.74rem; color: var(--muted); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
    .task-meta .icon-check { color: var(--accent); }
    .delete-btn {
      background: none; border: none; cursor: pointer; padding: 5px 6px;
      border-radius: 7px; color: var(--muted); transition: all .15s;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px;
    }
    .delete-btn:hover { background: rgba(248,113,113,.13); color: var(--danger); }
    .delete-btn svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px 28px 22px; width: 360px; max-width: 92vw;
    }
    .modal-icon {
      width: 44px; height: 44px; border-radius: 50%; background: rgba(248,113,113,.12);
      display: flex; align-items: center; justify-content: center; margin-bottom: 14px; color: var(--danger);
    }
    .modal-icon svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .modal h3 { font-family: 'Syne', sans-serif; font-size: 1.05rem; margin-bottom: 8px; }
    .modal p { color: var(--muted); font-size: 0.88rem; line-height: 1.55; }
    .modal p strong { color: var(--text); font-weight: 500; }
    .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
    .modal-btn { flex: 1; border: none; border-radius: 9px; padding: 10px 0; font-family: 'DM Sans', sans-serif; font-size: 0.87rem; font-weight: 500; cursor: pointer; transition: all .15s; }
    .modal-btn.cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .modal-btn.cancel:hover { color: var(--text); }
    .modal-btn.confirm { background: var(--danger); color: #fff; }
    .modal-btn.confirm:hover { opacity: .85; }
    .footer-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 18px; border-top: 1px solid var(--border); background: var(--surface2);
      font-size: 0.82rem; color: var(--muted);
    }
    #clear-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.82rem; font-family: 'DM Sans', sans-serif; transition: color .15s; }
    #clear-btn:hover { color: var(--danger); }
    .empty-state { padding: 52px 20px; text-align: center; color: var(--muted); font-size: 0.9rem; }
    .empty-state .icon { font-size: 2.2rem; margin-bottom: 12px; }
    .toast {
      position: fixed; bottom: 26px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 22px; font-size: 0.85rem; color: var(--text);
      transition: transform .3s ease; z-index: 99; white-space: nowrap; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo" data-cy="app-title">Lista de Tarefas</div>
  <p class="subtitle" data-cy="app-subtitle">Organize seu dia com eficiência</p>
</header>

<div class="card">
  <div class="input-row">
    <input id="task-input" type="text" placeholder="Adicionar nova tarefa..." data-cy="task-input" />
    <button id="add-btn" data-cy="add-btn">ADICIONAR</button>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all" data-cy="filter-all">Todas</button>
    <button class="filter-btn" data-filter="active" data-cy="filter-active">Ativas</button>
    <button class="filter-btn" data-filter="completed" data-cy="filter-completed">Concluídas</button>
  </div>
  <ul id="task-list" data-cy="task-list"></ul>
  <div class="footer-bar">
    <span id="task-count" data-cy="task-count">0 tarefas restantes</span>
    <button id="clear-btn" data-cy="clear-btn">Limpar concluídas</button>
  </div>
</div>

<div class="modal-overlay" id="confirm-modal" style="display:none" data-cy="confirm-modal">
  <div class="modal">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </div>
    <h3>Excluir tarefa?</h3>
    <p>Tem certeza que deseja excluir a tarefa <strong id="modal-task-title" data-cy="modal-task-title"></strong>? Esta ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="modal-cancel" data-cy="modal-cancel">Cancelar</button>
      <button class="modal-btn confirm" id="modal-confirm" data-cy="modal-confirm">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Estado em memória (sem backend necessário para o frontend standalone) ──
  let tasks = [];
  let nextId = 1;
  let currentFilter = 'all';
  let pendingDeleteId = null;

  const TRASH = `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`;

  function addTask() {
    const input = document.getElementById('task-input');
    const title = input.value.trim();
    if (!title) { showToast('Digite o título da tarefa!'); return; }
    tasks.push({ id: nextId++, title, completed: false, completedAt: null, createdAt: new Date().toISOString() });
    input.value = '';
    render();
    showToast('Tarefa adicionada!');
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.completed = !task.completed;
    task.completedAt = task.completed ? new Date().toISOString() : null;
    render();
  }

  function askDelete(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    pendingDeleteId = id;
    document.getElementById('modal-task-title').textContent = '"' + task.title + '"';
    document.getElementById('confirm-modal').style.display = 'flex';
  }

  function confirmDelete() {
    tasks = tasks.filter(t => t.id !== pendingDeleteId);
    pendingDeleteId = null;
    closeModal();
    render();
    showToast('Tarefa removida.');
  }

  function closeModal() {
    document.getElementById('confirm-modal').style.display = 'none';
    pendingDeleteId = null;
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    render();
    showToast('Concluídas removidas!');
  }

  function getFiltered() {
    const active = tasks.filter(t => !t.completed);
    const done   = tasks.filter(t =>  t.completed);
    if (currentFilter === 'active')    return active;
    if (currentFilter === 'completed') return done;
    return [...active, ...done];
  }

  function fmt(iso) {
    if (!iso) return '';
    const d = new Date(iso), p = n => String(n).padStart(2,'0');
    return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear()+', '+p(d.getHours())+':'+p(d.getMinutes());
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function render() {
    const list = document.getElementById('task-list');
    const filtered = getFiltered();
    const remaining = tasks.filter(t => !t.completed).length;
    document.getElementById('task-count').textContent =
      remaining + ' tarefa' + (remaining !== 1 ? 's' : '') + ' restante' + (remaining !== 1 ? 's' : '');

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">✓</div><p>Nenhuma tarefa aqui.</p></div>';
      return;
    }

    list.innerHTML = filtered.map(function(task) {
      return '<li class="task-item' + (task.completed ? ' is-done' : '') + '" data-cy="task-item">' +
        '<div class="task-check' + (task.completed ? ' done' : '') + '" data-cy="task-check-' + task.id + '" onclick="toggleTask(' + task.id + ')"></div>' +
        '<div class="task-body">' +
          '<span class="task-title' + (task.completed ? ' done' : '') + '" data-cy="task-title-' + task.id + '">' + esc(task.title) + '</span>' +
          (task.completed && task.completedAt
            ? '<div class="task-meta" data-cy="task-completed-at-' + task.id + '"><span class="icon-check">✓</span> Concluída em ' + fmt(task.completedAt) + '</div>'
            : '') +
        '</div>' +
        '<button class="delete-btn" data-cy="delete-btn-' + task.id + '" onclick="askDelete(' + task.id + ')" title="Excluir tarefa">' + TRASH + '</button>' +
      '</li>';
    }).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  document.getElementById('add-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') addTask(); });
  document.getElementById('clear-btn').addEventListener('click', clearCompleted);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-confirm').addEventListener('click', confirmDelete);
  document.getElementById('confirm-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      render();
    });
  });

  render();
</script>
</body>
</html>
